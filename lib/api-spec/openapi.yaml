openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: Auth
    description: Browser and mobile authentication endpoints.
  - name: BurnHistory
    description: Per-user burn and recovery history.
  - name: SavedTokens
    description: Per-user saved token list.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.
  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        '302':
          description: Redirect to returnTo on success or login on failure.
  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.
  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Token did not contain usable claims.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Token exchange failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'
  /burn-history:
    get:
      tags: [BurnHistory]
      operationId: listBurnHistory
      summary: List the current user's burn history
      parameters:
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: List of burn history rows.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BurnHistoryListResponse'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    post:
      tags: [BurnHistory]
      operationId: recordBurnHistory
      summary: Record a new burn or recovery
      parameters:
        - $ref: '#/components/parameters/SessionCookie'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BurnHistoryCreate'
      responses:
        '201':
          description: Created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BurnHistoryItem'
        '400':
          description: Invalid input.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /saved-tokens:
    get:
      tags: [SavedTokens]
      operationId: listSavedTokens
      summary: List the current user's saved tokens
      parameters:
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: List of saved tokens.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SavedTokenListResponse'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    post:
      tags: [SavedTokens]
      operationId: createSavedToken
      summary: Save a token to the user's list
      parameters:
        - $ref: '#/components/parameters/SessionCookie'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SavedTokenCreate'
      responses:
        '201':
          description: Created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SavedTokenItem'
        '400':
          description: Invalid input.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /saved-tokens/{id}:
    delete:
      tags: [SavedTokens]
      operationId: deleteSavedToken
      summary: Remove a saved token
      parameters:
        - $ref: '#/components/parameters/SessionCookie'
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
          format: email
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']
    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'
    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
          format: uri
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1
    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string
    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string
    BurnHistoryCreate:
      type: object
      required: [chainId, tokenAddress, tokenSymbol, tokenDecimals, amount, mode, txHash]
      properties:
        chainId:
          type: integer
          minimum: 1
          maximum: 2147483647
        tokenAddress:
          type: string
          pattern: '^(native|0x[a-fA-F0-9]{40})$'
        tokenSymbol:
          type: string
          minLength: 1
          maxLength: 32
        tokenDecimals:
          type: integer
          minimum: 0
          maximum: 36
        amount:
          type: string
          pattern: '^[0-9]{1,80}$'
        mode:
          type: string
          enum: [burn, recover]
        txHash:
          type: string
          pattern: '^0x[a-fA-F0-9]{64}$'
        recoveredNative:
          type: [string, 'null']
          pattern: '^[0-9]{1,80}$'
    BurnHistoryItem:
      type: object
      required: [id, chainId, tokenAddress, tokenSymbol, tokenDecimals, amount, mode, txHash, createdAt]
      properties:
        id:
          type: string
        chainId:
          type: integer
        tokenAddress:
          type: string
        tokenSymbol:
          type: string
        tokenDecimals:
          type: integer
        amount:
          type: string
        mode:
          type: string
        txHash:
          type: string
        recoveredNative:
          type: [string, 'null']
        createdAt:
          type: string
          format: date-time
    BurnHistoryListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/BurnHistoryItem'
    SavedTokenCreate:
      type: object
      required: [chainId, tokenAddress, tokenSymbol, decimals]
      properties:
        chainId:
          type: integer
          minimum: 1
          maximum: 2147483647
        tokenAddress:
          type: string
          pattern: '^0x[a-fA-F0-9]{40}$'
        tokenSymbol:
          type: string
          minLength: 1
          maxLength: 32
        tokenName:
          type: [string, 'null']
          maxLength: 128
        decimals:
          type: integer
          minimum: 0
          maximum: 36
    SavedTokenItem:
      type: object
      required: [id, chainId, tokenAddress, tokenSymbol, decimals, createdAt]
      properties:
        id:
          type: string
        chainId:
          type: integer
        tokenAddress:
          type: string
        tokenSymbol:
          type: string
        tokenName:
          type: [string, 'null']
        decimals:
          type: integer
        createdAt:
          type: string
          format: date-time
    SavedTokenListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/SavedTokenItem'
