<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!--
    NadBurn favicon — violet particle flame.
    Uses SMIL animation so the flame flickers and the particles drift up.
    Firefox/Safari animate this in the tab; Chrome shows the first frame
    (still a flame, still on-brand).
  -->
  <defs>
    <radialGradient id="flame" cx="50%" cy="65%" r="55%">
      <stop offset="0%" stop-color="#fff7ff" />
      <stop offset="35%" stop-color="#f472f6" />
      <stop offset="70%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#5b21b6" />
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="75%" r="35%">
      <stop offset="0%" stop-color="#fef9c3" stop-opacity="0.95" />
      <stop offset="60%" stop-color="#fbbf24" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="bgGlow" cx="50%" cy="55%" r="50%">
      <stop offset="0%" stop-color="#3b0764" />
      <stop offset="100%" stop-color="#0a0118" />
    </radialGradient>
  </defs>

  <!-- Dark violet backdrop -->
  <rect width="64" height="64" rx="14" fill="url(#bgGlow)" />

  <!-- Main flame, drawn as a teardrop. The transform animates to a small
       flicker so the flame feels alive in the tab. -->
  <g transform-origin="32px 50px">
    <animateTransform attributeName="transform" type="scale"
      values="1 1; 1.05 0.95; 0.97 1.06; 1 1"
      keyTimes="0; 0.33; 0.66; 1"
      dur="1.1s" repeatCount="indefinite" />
    <path
      d="M32 9
         C 22 22, 16 30, 16 39
         C 16 49, 23 56, 32 56
         C 41 56, 48 49, 48 39
         C 48 30, 42 22, 32 9 Z"
      fill="url(#flame)" />
    <!-- Hot inner core -->
    <ellipse cx="32" cy="44" rx="9" ry="11" fill="url(#core)">
      <animate attributeName="ry" values="11;9;12;11" dur="0.9s"
        repeatCount="indefinite" />
    </ellipse>
  </g>

  <!-- Drifting particles. Each starts low + opaque, floats upward, fades out. -->
  <g fill="#f0abfc">
    <circle cx="20" cy="46" r="1.4" opacity="0">
      <animate attributeName="cy" values="46;6" dur="2.2s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;0.95;0" dur="2.2s" repeatCount="indefinite" />
    </circle>
    <circle cx="44" cy="50" r="1.1" opacity="0">
      <animate attributeName="cy" values="50;10" dur="1.8s" begin="0.5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;0.9;0" dur="1.8s" begin="0.5s" repeatCount="indefinite" />
    </circle>
    <circle cx="32" cy="48" r="0.9" opacity="0">
      <animate attributeName="cy" values="48;4" dur="2.6s" begin="0.9s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;0.85;0" dur="2.6s" begin="0.9s" repeatCount="indefinite" />
    </circle>
    <circle cx="14" cy="40" r="0.8" opacity="0">
      <animate attributeName="cy" values="40;12" dur="2.0s" begin="1.2s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;0.8;0" dur="2.0s" begin="1.2s" repeatCount="indefinite" />
    </circle>
    <circle cx="50" cy="42" r="1.2" opacity="0">
      <animate attributeName="cy" values="42;8" dur="2.4s" begin="0.2s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0;0.85;0" dur="2.4s" begin="0.2s" repeatCount="indefinite" />
    </circle>
  </g>
</svg>
